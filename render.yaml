services:
  - type: web
    name: chounaikai-portal
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm --prefix backend run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false